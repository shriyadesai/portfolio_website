  <rect x="0" y="0" width="680" height="500" fill="url(#paper-syl)"/>

  <rect x="40" y="40" width="600" height="420" fill="#F5E9CC" stroke="#8B4B2F" stroke-width="2"/>
  <rect x="46" y="46" width="588" height="408" fill="none" stroke="#8B4B2F" stroke-width="0.8"/>

