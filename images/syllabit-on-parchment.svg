  <g filter="url(#syl-wobble-word)">
    <text x="305" y="285" text-anchor="start" font-family="Nunito, system-ui, sans-serif" font-size="78" font-weight="900" fill="none" stroke="#2A2A2A" stroke-width="2.5" letter-spacing="-1">Syllabit</text>
