<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <title>Syllabit — sketched logo on parchment</title>

  <defs>
    <pattern id="paper-syl" patternUnits="userSpaceOnUse" width="14" height="14">
      <circle cx="7" cy="7" r="0.6" fill="#B8864B" opacity="0.2"/>
    </pattern>
    <pattern id="syl-ink-light" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2A2A2A" stroke-width="0.6" opacity="0.5"/>
    </pattern>
    <pattern id="syl-ink-med" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2A2A2A" stroke-width="0.9"/>
    </pattern>
    <pattern id="syl-ink-dense" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2A2A2A" stroke-width="1"/>
    </pattern>
    <pattern id="syl-ink-word" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2A2A2A" stroke-width="0.8"/>
    </pattern>

    <filter id="syl-wobble-grid" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>

    <filter id="syl-wobble-word" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>

