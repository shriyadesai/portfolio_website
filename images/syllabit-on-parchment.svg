  <g filter="url(#syl-wobble-word)">
    <text x="305" y="318" text-anchor="start" font-family="Nunito, system-ui, sans-serif" font-size="15" font-weight="700" fill="#5D3A1E" letter-spacing="0.5">divide the syllabus. conquer the semester.</text>
