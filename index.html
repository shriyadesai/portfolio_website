<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shriya's Desk — A Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F5EFE2;
      --paper-2: #EADDBA;
      --ink: #2E2311;
      --ink-soft: #5F4A20;
      --ink-faint: #9F8C5F;
      --rule: #B5A878;
      --burgundy: #7A2E1D;
      --gold: #854F0B;
      --terracotta: #A84A3A;
      --sage: #8FA872;
      --sky: #B5D4F4;
      --bg-dark: #1F1A10;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top, #2E2818 0%, #1F1A10 70%);
      color: var(--ink);
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Room */
    .room {
      position: relative;
      width: 100%;
      max-width: 1400px;
      height: 100%;
      max-height: 820px;
      background: var(--paper);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(212, 184, 135, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(255, 234, 197, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(139, 122, 85, 0.18) 0%, transparent 60%);
      border-radius: 4px;
      box-shadow: 0 40px 80px -30px rgba(0, 0, 0, 0.55), 0 60px 120px -60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      transition: filter 0.5s ease;
    }

    /* Wall + floor + desk surface */
    .wall { position: absolute; left: 0; top: 0; right: 0; height: 65%; background: linear-gradient(180deg, #F0E6CC 0%, #EADBB7 100%); }
    .floor { position: absolute; left: 0; bottom: 0; right: 0; height: 35%; background: linear-gradient(180deg, #C9A876 0%, #A88B5C 100%); }
    .desk-edge { position: absolute; left: 0; right: 0; top: 65%; height: 4px; background: #6F5530; opacity: 0.5; }

    /* Floor planks */
    .floor::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent 0, transparent 119px, rgba(89, 67, 38, 0.4) 119px, rgba(89, 67, 38, 0.4) 120px);
    }

    /* Title floats subtly */
    .title-block {
      position: absolute;
      left: 50%;
      top: 8%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    .title-block .eyebrow {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .title-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(34px, 4vw, 52px);
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .title-block .sub {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Hot zones — buttons positioned over the SVG illustration */
    .hot {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease;
      z-index: 3;
    }
    .hot:hover, .hot:focus {
      outline: none;
      transform: scale(1.06) translateY(-2px);
      filter: drop-shadow(0 6px 16px rgba(46, 35, 17, 0.3));
    }

    /* Hot zone positions */
    .hot-window { left: 8%; top: 12%; width: 18%; height: 38%; }
    .hot-frame { left: 30%; top: 14%; width: 14%; height: 22%; }
    .hot-shelf { right: 6%; top: 12%; width: 22%; height: 32%; }
    .hot-notebook { left: 18%; top: 60%; width: 17%; height: 28%; }
    .hot-cup { left: 40%; top: 65%; width: 10%; height: 22%; }
    .hot-lamp { left: 52%; top: 40%; width: 14%; height: 38%; }
    .hot-plant { right: 18%; top: 50%; width: 13%; height: 32%; }
    .hot-letter { right: 4%; top: 70%; width: 14%; height: 18%; }

    /* Hover caption */
    .caption {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink-soft);
      background: rgba(245, 233, 204, 0.92);
      border: 1px solid rgba(139, 122, 85, 0.3);
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      letter-spacing: 0.5px;
      z-index: 5;
    }
    .caption.visible { opacity: 1; }

    /* Hint at bottom */
    .hint {
      position: absolute;
      right: 24px;
      bottom: 12px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.5px;
    }

    /* Detail overlay (panels for non-notebook sections) */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(46, 35, 17, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      animation: fadeIn 0.3s ease;
    }
    .overlay.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .panel {
      max-width: 540px;
      width: 100%;
      max-height: 85%;
      overflow-y: auto;
      animation: panelIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      background: rgba(245, 233, 204, 0.9);
      border: 1px solid rgba(95, 74, 32, 0.3);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.2s ease;
    }
    .close-btn:hover { background: var(--paper); color: var(--burgundy); }

    /* About — tea cup style: small handwritten card on a saucer */
    .panel-about {
      background: #F5E9CC;
      border-radius: 4px;
      padding: 48px 56px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      position: relative;
      border: 1px solid rgba(139, 122, 85, 0.3);
    }
    .panel-about::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(139, 122, 85, 0.2);
      border-radius: 2px;
      pointer-events: none;
    }

    /* Letter — actual letter style */
    .panel-letter {
      background: #F5E9CC;
      padding: 56px 64px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      position: relative;
      transform: rotate(-1deg);
    }
    .panel-letter::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 30%;
      width: 80px;
      height: 22px;
      background: rgba(168, 74, 58, 0.6);
      transform: rotate(-3deg);
    }

    /* Plant / writing — page from a journal */
    .panel-writing {
      background: #F5E9CC;
      padding: 48px 56px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      background-image:
        repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(139, 122, 85, 0.2) 31px, rgba(139, 122, 85, 0.2) 32px);
      border-left: 3px solid rgba(168, 74, 58, 0.5);
    }

    /* Lamp / values — small framed list */
    .panel-values {
      background: #F5E9CC;
      padding: 44px 52px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      border: 8px solid #8B6443;
      border-image: none;
      position: relative;
    }
    .panel-values::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(139, 122, 85, 0.4);
      pointer-events: none;
    }

    /* Window / career — postcards stack */
    .panel-career {
      background: #F5E9CC;
      padding: 48px 56px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      position: relative;
    }

    /* Frame / about-photo - polaroid */
    .panel-frame {
      background: #F5E9CC;
      padding: 24px 24px 60px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
      transform: rotate(-2deg);
    }

    /* Shelf / writing list */
    .panel-shelf {
      background: #F5E9CC;
      padding: 48px 56px;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.4);
    }

    /* Common panel typography */
    .panel-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 36px;
      color: var(--ink);
      margin-bottom: 18px;
      line-height: 1.05;
    }
    .panel-body {
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--ink);
    }
    .panel-body p { margin-bottom: 14px; }
    .panel-body p:last-child { margin-bottom: 0; }
    .panel-body em { color: var(--burgundy); }

    .signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 32px;
      color: var(--burgundy);
      margin-top: 14px;
    }

    .contact-list {
      margin-top: 18px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
    }
    .contact-list div {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 14px;
      margin-bottom: 6px;
      align-items: baseline;
    }
    .contact-list .lbl { font-style: italic; color: var(--ink-soft); text-align: right; }
    .contact-list a {
      color: var(--burgundy);
      text-decoration: none;
      border-bottom: 1px dotted var(--burgundy);
    }

    .values-list {
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      line-height: 1.85;
    }
    .values-list li {
      padding-left: 22px;
      position: relative;
      margin-bottom: 8px;
    }
    .values-list li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 13px;
    }

    .career-step {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px dotted var(--rule);
      align-items: baseline;
    }
    .career-step:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .career-step .when {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      text-align: right;
    }
    .career-step .what {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 19px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .career-step .desc {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .writing-item {
      padding: 12px 0;
      border-bottom: 1px dotted var(--rule);
    }
    .writing-item:last-child { border-bottom: none; }
    .writing-item .date {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .writing-item .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 19px;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .writing-item .ex {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .polaroid-photo {
      width: 280px;
      height: 280px;
      background: radial-gradient(ellipse at 50% 40%, #D4C28E 0%, #B09668 70%, #8A7548 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--ink-soft);
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }
    .polaroid-cap {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      color: var(--ink-soft);
      font-size: 16px;
    }

    /* NOTEBOOK — separate, larger overlay where the notebook expands across desk */
    .notebook-overlay {
      position: absolute;
      inset: 0;
      background: rgba(46, 35, 17, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 30px;
      z-index: 10;
    }
    .notebook-overlay.open {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    .notebook-spread {
      max-width: 1100px;
      width: 100%;
      max-height: 90%;
      background: #F5E9CC;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
      animation: notebookOpen 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @keyframes notebookOpen {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    .notebook-spread::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(139, 122, 85, 0.5), transparent);
      transform: translateX(-1px);
    }
    .notebook-page {
      padding: 56px 56px 64px;
      position: relative;
      min-height: 600px;
    }
    .notebook-page-left {
      background: linear-gradient(90deg, #EADDBA 0%, #F5E9CC 30%);
    }

    .notebook-toc {
      list-style: none;
      padding: 0;
      margin: 24px 0 0;
    }
    .notebook-toc li {
      display: flex;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px dotted var(--rule);
      cursor: pointer;
      transition: color 0.25s ease;
    }
    .notebook-toc li:hover {
      color: var(--burgundy);
    }
    .notebook-toc li:hover .toc-name { color: var(--burgundy); }
    .notebook-toc li.active .toc-name { color: var(--burgundy); font-weight: 500; }
    .toc-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      width: 32px;
      font-size: 17px;
    }
    .toc-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      flex: 1;
      transition: color 0.25s ease;
    }
    .toc-meta {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .project-detail-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .project-detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 36px;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.05;
    }
    .project-detail-role {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 22px;
    }
    .project-detail-body {
      font-family: 'EB Garamond', serif;
      font-size: 15.5px;
      line-height: 1.75;
      color: var(--ink);
    }
    .project-detail-body p { margin-bottom: 14px; }

    .notebook-close {
      position: absolute;
      top: 18px;
      right: 22px;
      background: rgba(168, 74, 58, 0.85);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      color: #F5E9CC;
      font-size: 18px;
      z-index: 20;
    }
    .notebook-close:hover { background: var(--burgundy); }

    /* Mobile / narrow */
    @media (max-width: 900px) {
      body { padding: 8px; }
      .room { max-height: none; height: calc(100vh - 16px); }
      .title-block h1 { font-size: 28px; }
      .title-block .sub { font-size: 9px; letter-spacing: 2px; }
      .panel { max-width: 92%; }
      .panel-about, .panel-letter, .panel-writing, .panel-values, .panel-career, .panel-frame, .panel-shelf {
        padding: 32px 28px;
      }
      .panel-title { font-size: 26px; }
      .notebook-spread {
        grid-template-columns: 1fr;
        max-height: 92%;
      }
      .notebook-spread::before { display: none; }
      .notebook-page { padding: 32px 24px; min-height: auto; }
      .career-step, .contact-list div { grid-template-columns: 1fr; gap: 4px; }
      .career-step .when, .contact-list .lbl { text-align: left; }
    }
  </style>
</head>
<body>

  <div class="room" id="room">

    <div class="wall"></div>
    <div class="floor"></div>
    <div class="desk-edge"></div>

    <!-- Title floats high on the wall -->
    <div class="title-block">
      <div class="eyebrow">welcome to —</div>
      <h1>Shriya's Desk</h1>
      <div class="sub">a portfolio · in one room</div>
    </div>

    <!-- Big illustrated room SVG, layered behind hot zones -->
    <svg viewBox="0 0 1400 820" preserveAspectRatio="xMidYMid slice" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;" xmlns="http://www.w3.org/2000/svg">

      <!-- WINDOW (left) -->
      <g transform="translate(115, 105)">
        <rect x="0" y="0" width="240" height="290" fill="#8B6443" stroke="#5D3A1E" stroke-width="3"/>
        <rect x="10" y="10" width="220" height="270" fill="#B5D4F4"/>
        <line x1="120" y1="10" x2="120" y2="280" stroke="#5D3A1E" stroke-width="3"/>
        <line x1="10" y1="145" x2="230" y2="145" stroke="#5D3A1E" stroke-width="3"/>
        <!-- sky details -->
        <circle cx="170" cy="60" r="22" fill="#FAEAC5" opacity="0.85"/>
        <path d="M 14 200 Q 50 175, 90 195 Q 105 175, 116 200 L 116 280 L 14 280 Z" fill="#8FA872" opacity="0.7"/>
        <path d="M 124 220 Q 160 200, 195 215 Q 215 195, 230 215 L 230 280 L 124 280 Z" fill="#8FA872" opacity="0.65"/>
        <!-- birds -->
        <path d="M 180 110 Q 184 106, 188 110 Q 192 106, 196 110" stroke="#5D3A1E" stroke-width="1.2" fill="none"/>
        <path d="M 60 80 Q 64 77, 68 80 Q 72 77, 76 80" stroke="#5D3A1E" stroke-width="1" fill="none"/>
      </g>

      <!-- FRAMED PHOTO ON WALL -->
      <g transform="translate(440, 130)">
        <rect x="0" y="0" width="160" height="170" fill="#8B6443" stroke="#5D3A1E" stroke-width="2.5"/>
        <rect x="10" y="10" width="140" height="150" fill="#EADDBA"/>
        <ellipse cx="80" cy="75" rx="32" ry="38" fill="#D4A878"/>
        <path d="M 50 130 Q 80 100, 110 130 L 110 160 L 50 160 Z" fill="#A84A3A"/>
        <text x="80" y="175" text-anchor="middle" font-family="Cormorant Garamond, serif" font-style="italic" font-size="11" fill="#5D3A1E">— shriya, 2024 —</text>
      </g>

      <!-- BOOKSHELF (right wall) -->
      <g transform="translate(990, 100)">
        <rect x="0" y="0" width="290" height="270" fill="#A87A52" stroke="#5D3A1E" stroke-width="3"/>
        <rect x="0" y="0" width="290" height="270" fill="none" stroke="#5D3A1E" stroke-width="1" opacity="0.5"/>
        <line x1="0" y1="90" x2="290" y2="90" stroke="#5D3A1E" stroke-width="2.5"/>
        <line x1="0" y1="180" x2="290" y2="180" stroke="#5D3A1E" stroke-width="2.5"/>

        <!-- shelf 1 books -->
        <rect x="14" y="20" width="22" height="68" fill="#A84A3A" stroke="#5D3A1E" stroke-width="1.5"/>
        <rect x="38" y="14" width="20" height="74" fill="#3D5A7A" stroke="#5D3A1E" stroke-width="1.5"/>
        <rect x="60" y="22" width="26" height="66" fill="#8B6443" stroke="#5D3A1E" stroke-width="1.5"/>
        <rect x="88" y="18" width="18" height="70" fill="#8FA872" stroke="#5D3A1E" stroke-width="1.5"/>
        <rect x="108" y="24" width="24" height="64" fill="#E8B540" stroke="#5D3A1E" stroke-width="1.5"/>

    function closeNotebook() { notebookOverlay.classList.remove('open'); }

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closePanel();
    });
    notebookOverlay.addEventListener('click', function (e) {
      if (e.target === notebookOverlay) closeNotebook();
    });
    document.getElementById('notebook-close').addEventListener('click', closeNotebook);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closePanel();
        closeNotebook();
      }
    });
  </script>

</body>
</html>
