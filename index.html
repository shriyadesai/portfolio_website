<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shriya's Reading Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --wall: #F5DCC8;
      --wall-2: #EFCDB3;
      --floor: #D49B7E;
      --floor-2: #C28568;
      --rug: #F5EAD9;
      --sage: #B0C29A;
      --sage-deep: #889A6F;
      --sky: #C9DCDF;
      --sky-deep: #A8C2C7;
      --terracotta: #C56843;
      --terracotta-deep: #A04E2E;
      --warm-cream: #F8E9D0;
      --soft-shadow: rgba(122, 78, 42, 0.18);
      --ink: #4A3220;
      --ink-soft: #7A5A3E;
      --ink-faint: #A88B6A;
      --gold: #B07832;
      --burgundy: #8B3A26;
      --bg-dark: #1F1A10;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top, #2E2818 0%, #1F1A10 70%);
      color: var(--ink);
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

   .room {
  position: relative;
  width: 100%;
  max-width: 1500px;
  height: 100%;
  max-height: 850px;
  ...
}

    /* Title block at top of wall */
    .title-block {
      position: absolute;
      left: 50%;
      top: 4%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 6;
    }
    .title-block .eyebrow {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      letter-spacing: 1.5px;
      margin-bottom: 2px;
    }
    .title-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(28px, 3.2vw, 44px);
      color: var(--ink);
      line-height: 1;
      margin-bottom: 4px;
    }
    .title-block .sub {
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* SVG room fills the container */
    .room-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Hot zones — invisible buttons placed over SVG features */
    .hot {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.35s ease;
      z-index: 4;
    }
    .hot:hover, .hot:focus {
      outline: none;
      transform: scale(1.05) translateY(-3px);
      filter: drop-shadow(0 8px 20px rgba(74, 50, 32, 0.3));
    }

    /* Hot zone positioning — anchored against the symmetric room layout */
    .hot-window     { left: 38%;  top: 14%;  width: 24%;  height: 50%; }
    .hot-bigplant   { left: 64%;  top: 22%;  width: 14%;  height: 42%; }
    .hot-shelf      { left: 9%;   top: 26%;  width: 12%;  height: 42%; }
    .hot-frame      { left: 11%;  top: 8%;   width: 9%;   height: 13%; }
    .hot-armchair   { left: 76%;  top: 50%;  width: 18%;  height: 35%; }
    .hot-pillow     { left: 80%;  top: 56%;  width: 9%;   height: 11%; }
    .hot-smallplant { left: 1.5%; top: 60%;  width: 9%;   height: 28%; }
    .hot-letter     { left: 26%;  top: 73%;  width: 9%;   height: 12%; }
    .hot-cup        { left: 41%;  top: 76%;  width: 5.5%; height: 11%; }
    .hot-books      { left: 11%;  top: 38%;  width: 8%;   height: 7%; }

    /* Hover caption */
    .caption {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink);
      background: rgba(248, 233, 208, 0.92);
      border: 1px solid rgba(176, 120, 50, 0.25);
      padding: 7px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      letter-spacing: 0.5px;
      z-index: 5;
      white-space: nowrap;
    }
    .caption.visible { opacity: 1; }

    .hint {
      position: absolute;
      right: 22px;
      bottom: 12px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.5px;
      opacity: 0.7;
      z-index: 5;
    }

    /* Detail overlay for non-notebook sections */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(74, 50, 32, 0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      animation: fadeIn 0.3s ease;
    }
    .overlay.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .panel {
      max-width: 540px;
      width: 100%;
      max-height: 85%;
      overflow-y: auto;
      animation: panelIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      background: rgba(248, 233, 208, 0.95);
      border: 1px solid rgba(122, 90, 62, 0.3);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.2s ease;
    }
    .close-btn:hover { background: var(--warm-cream); color: var(--burgundy); }

    /* Panel variants — each object opens its own visual style */
    .panel-card {
      background: var(--warm-cream);
      border-radius: 6px;
      padding: 44px 52px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.4);
      border: 1px solid rgba(176, 120, 50, 0.25);
    }
    .panel-letter {
      background: var(--warm-cream);
      padding: 52px 60px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.4);
      transform: rotate(-1.2deg);
      position: relative;
    }
    .panel-letter::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 32%;
      width: 80px;
      height: 22px;
      background: var(--terracotta);
      opacity: 0.7;
      transform: rotate(-3deg);
    }
    .panel-frame {
      background: var(--warm-cream);
      padding: 22px 22px 50px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.4);
      transform: rotate(-1.5deg);
    }
    .panel-journal {
      background: var(--warm-cream);
      padding: 44px 52px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.4);
      background-image:
        repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(176, 120, 50, 0.18) 31px, rgba(176, 120, 50, 0.18) 32px);
      border-left: 3px solid var(--terracotta);
    }
    .panel-cushion {
      background: var(--sage);
      padding: 40px 48px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.4);
      border-radius: 12px;
      color: var(--warm-cream);
    }
    .panel-cushion .panel-eyebrow { color: rgba(248, 233, 208, 0.85); }
    .panel-cushion .panel-title { color: var(--warm-cream); }
    .panel-cushion .panel-body, .panel-cushion .values-list { color: var(--warm-cream); }
    .panel-cushion .values-list li::before { color: var(--warm-cream); }

    .panel-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
      color: var(--ink);
      margin-bottom: 18px;
      line-height: 1.05;
    }
    .panel-body {
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--ink);
    }
    .panel-body p { margin-bottom: 14px; }
    .panel-body p:last-child { margin-bottom: 0; }
    .panel-body em { color: var(--burgundy); font-style: italic; }

    .signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 30px;
      color: var(--burgundy);
      margin-top: 12px;
    }

    .contact-list {
      margin-top: 18px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
    }
    .contact-list div {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 14px;
      margin-bottom: 6px;
      align-items: baseline;
    }
    .contact-list .lbl { font-style: italic; color: var(--ink-soft); text-align: right; }
    .contact-list a {
      color: var(--burgundy);
      text-decoration: none;
      border-bottom: 1px dotted var(--burgundy);
    }

    .values-list {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
      font-family: 'EB Garamond', serif;
      font-size: 15.5px;
      line-height: 1.85;
    }
    .values-list li {
      padding-left: 22px;
      position: relative;
      margin-bottom: 6px;
    }
    .values-list li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 12px;
    }

    .career-step {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
      align-items: baseline;
    }
    .career-step:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .career-step .when {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      text-align: right;
    }
    .career-step .what {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .career-step .desc {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .writing-item {
      padding: 12px 0;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
    }
    .writing-item:last-child { border-bottom: none; }
    .writing-item .date {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .writing-item .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .writing-item .ex {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .polaroid-photo {
      width: 280px;
      height: 280px;
      background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .polaroid-cap {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      color: var(--ink-soft);
      font-size: 16px;
    }

    /* NOTEBOOK opens as a two-page spread */
    .notebook-overlay {
      position: absolute;
      inset: 0;
      background: rgba(74, 50, 32, 0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 30px;
      z-index: 10;
    }
    .notebook-overlay.open {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    .notebook-spread {
      max-width: 1100px;
      width: 100%;
      max-height: 90%;
      background: var(--warm-cream);
      box-shadow: 0 30px 80px -30px rgba(0,0,0,0.6);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
      animation: notebookOpen 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @keyframes notebookOpen {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    .notebook-spread::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(176, 120, 50, 0.45), transparent);
      transform: translateX(-1px);
    }
    .notebook-page {
      padding: 48px 52px 56px;
      position: relative;
      min-height: 540px;
    }
    .notebook-page-left {
      background: linear-gradient(90deg, rgba(212, 155, 126, 0.18) 0%, transparent 30%);
    }
    .notebook-toc {
      list-style: none;
      padding: 0;
      margin: 22px 0 0;
    }
    .notebook-toc li {
      display: flex;
      align-items: baseline;
      padding: 11px 0;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
      cursor: pointer;
      transition: color 0.25s ease;
    }
    .notebook-toc li:hover .toc-name { color: var(--burgundy); }
    .notebook-toc li.active .toc-name { color: var(--burgundy); font-weight: 500; }
    .toc-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      width: 32px;
      font-size: 17px;
    }
    .toc-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 21px;
      color: var(--ink);
      flex: 1;
      transition: color 0.25s ease;
    }
    .toc-meta {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .project-detail-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .project-detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
      color: var(--ink);
      margin-bottom: 5px;
      line-height: 1.05;
    }
    .project-detail-role {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 20px;
    }
    .project-detail-body {
      font-family: 'EB Garamond', serif;
      font-size: 15.5px;
      line-height: 1.75;
      color: var(--ink);
    }
    .project-detail-body p { margin-bottom: 13px; }

    .notebook-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: var(--terracotta);
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--warm-cream);
      font-size: 17px;
      z-index: 20;
    }
    .notebook-close:hover { background: var(--terracotta-deep); }

    @media (max-width: 900px) {
      body { padding: 8px; }
      .room { max-height: none; height: calc(100vh - 16px); }
      .title-block h1 { font-size: 24px; }
      .title-block .sub { font-size: 9px; letter-spacing: 2.5px; }
      .panel { max-width: 92%; }
      .panel-card, .panel-letter, .panel-journal, .panel-cushion, .panel-frame {
        padding: 30px 26px;
      }
      .panel-title { font-size: 24px; }
      .notebook-spread {
        grid-template-columns: 1fr;
        max-height: 92%;
      }
      .notebook-spread::before { display: none; }
      .notebook-page { padding: 28px 22px; min-height: auto; }
      .career-step, .contact-list div { grid-template-columns: 1fr; gap: 4px; }
      .career-step .when, .contact-list .lbl { text-align: left; }
    }
  </style>
</head>
<body>

  <div class="room">

    <div class="title-block">
      <div class="eyebrow">welcome to —</div>
      <h1>Shriya's Reading Room</h1>
      <div class="sub">a portfolio · in one room</div>
    </div>

    <!-- ROOM ILLUSTRATION -->
    <svg class="room-svg" viewBox="0 0 1500 850" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F5DCC8"/>
          <stop offset="100%" stop-color="#EFCDB3"/>
        </linearGradient>
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D49B7E"/>
          <stop offset="100%" stop-color="#B8825F"/>
        </linearGradient>
        <linearGradient id="windowSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D9E5E1"/>
          <stop offset="60%" stop-color="#C9DCDF"/>
          <stop offset="100%" stop-color="#A8C2C7"/>
        </linearGradient>
        <linearGradient id="curtainGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#F5EAD9" stop-opacity="0.9"/>
        </linearGradient>
        <linearGradient id="rugGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F8EAD3"/>
          <stop offset="100%" stop-color="#EBD9BC"/>
        </linearGradient>
        <radialGradient id="lightSpill" cx="0.5" cy="0" r="0.7">
          <stop offset="0%" stop-color="#FFF5E0" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#FFF5E0" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- WALL -->
      <rect x="0" y="0" width="1500" height="555" fill="url(#wallGrad)"/>
      <!-- FLOOR -->
      <rect x="0" y="555" width="1500" height="295" fill="url(#floorGrad)"/>
      <!-- floor planks -->
      <line x1="0" y1="640" x2="1500" y2="640" stroke="#9F6E4F" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="720" x2="1500" y2="720" stroke="#9F6E4F" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="800" x2="1500" y2="800" stroke="#9F6E4F" stroke-width="0.5" opacity="0.4"/>
      <!-- wall/floor edge -->
      <line x1="0" y1="555" x2="1500" y2="555" stroke="#9F6E4F" stroke-width="2" opacity="0.4"/>

      <!-- WINDOW (centered) -->
      <g>
        <!-- Window frame -->
        <rect x="570" y="120" width="360" height="430" fill="#E8C5A8" stroke="#A87A52" stroke-width="2"/>
        <rect x="582" y="132" width="336" height="406" fill="url(#windowSky)"/>
        <!-- Mullions -->
        <line x1="750" y1="132" x2="750" y2="538" stroke="#A87A52" stroke-width="3"/>
        <line x1="582" y1="335" x2="918" y2="335" stroke="#A87A52" stroke-width="3"/>
        <!-- Sky details: sun -->
        <circle cx="850" cy="200" r="22" fill="#FAEAC5" opacity="0.85"/>
        <!-- Distant hills -->
        <path d="M 582 290 Q 650 260, 720 280 Q 790 250, 850 275 Q 900 255, 918 280 L 918 335 L 582 335 Z" fill="#9FB59F" opacity="0.7"/>
        <!-- Trees -->
        <ellipse cx="640" cy="270" rx="22" ry="32" fill="#7A9572" opacity="0.85"/>
        <ellipse cx="700" cy="285" rx="18" ry="26" fill="#88A57E" opacity="0.85"/>
        <ellipse cx="800" cy="265" rx="20" ry="30" fill="#7A9572" opacity="0.85"/>
        <ellipse cx="870" cy="280" rx="18" ry="24" fill="#88A57E" opacity="0.8"/>
        <!-- Ground beyond window -->
        <rect x="582" y="335" width="336" height="203" fill="#D4A878" opacity="0.6"/>
        <!-- Railing/balcony -->
        <line x1="582" y1="455" x2="918" y2="455" stroke="#A04E2E" stroke-width="3"/>
        <line x1="600" y1="455" x2="600" y2="500" stroke="#A04E2E" stroke-width="2"/>
        <line x1="640" y1="455" x2="640" y2="500" stroke="#A04E2E" stroke-width="2"/>
        <line x1="680" y1="455" x2="680" y2="500" stroke="#A04E2E" stroke-width="2"/>
        <line x1="720" y1="455" x2="720" y2="500" stroke="#A04E2E" stroke-width="2"/>
        <line x1="780" y1="455" x2="780" y2="500" stroke="#A04E2E" stroke-width="2"/>

          </div>
          <p style="margin-top: 18px; font-style: italic;">Yours,</p>

      },
      cup: {

        title: 'Currently reading',
        body: `
          <ul class="values-list">
            <li><em>Iconoclast</em> — Gregory Berns. For the seminar; staying for the neuroscience.</li>
            <li><em>Organizational Culture and Leadership</em> — Edgar Schein. Slow but worth it.</li>

      books: {

        title: 'Writing',
        body: `
          <p style="font-style: italic; color: var(--ink-soft); margin-bottom: 14px;">Short essays on product, tradeoffs, and small decisions.</p>
          <div class="writing-item"><div class="date">Spring 2026</div><div class="name">On build-vs-buy, and other quiet questions</div><div class="ex">"The most interesting product decisions are rarely the ones that make the slide deck…"</div></div>

        `

    };

    const projects = {
      emrld: {
        eyebrow: 'PM & student consultant',
        title: 'EMRLD',
        role: 'A medical education platform · build vs. buy',
        body: `
          <p>The platform was at a fork: build the next set of features in-house, or buy from one of several vendors. Neither answer was obviously right.</p>
          <p>I built a weighted cost-capability framework, ran it across five vendors, and made the case for a hybrid approach — buy the core, build the differentiating layer. The decision cut projected development costs by 66 to 72 percent and kept the platform extensible for whatever came next.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— spring 2025 · medical edtech</p>
        `
      },
      stride: {
        eyebrow: 'founder & PM · top 30 of 625',
        title: 'Stride',
        role: 'Students meet startups',
        body: `
          <p>Students on one side. Recently funded startups on the other. No good way to find each other in the noise.</p>
          <p>I built the bridge — an NLP-driven matching engine for jobs and interview prep, validated through a thousand user interviews. We were selected top 30 of 625 teams nationally.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2024 · careers · NLP</p>
        `
      },
      pawsible: {
        eyebrow: 'innovation hackathon · 2nd place',
        title: 'Pawsible',
        role: 'AI-driven adoption for stray animals',
        body: `
          <p>A stray, picked up off the street. A shelter, a vet visit, a unique ID. Then an AI agent quietly matching the animal with the right home — for keeps.</p>
          <p>I defined end-to-end user journeys across three personas — adopter, shelter, volunteer — and the intelligent matching flows that connected them. Took second at the innovation hackathon.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2024 · social impact · AI</p>
        `

      lift: {
        eyebrow: 'IEEE published',
        title: 'Multi-motor lift system',
        role: 'Synchronous coordination across four motors',
        body: `
          <p>Four motors. One coordinated lift. The architecture had to keep them in perfect sync — no drift, no lag, no over-correction.</p>
          <p>Validated across thirty-plus test cycles, the system held tolerance and shaved 12 percent off the build cost through a leaner architecture. Published with IEEE.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2023 · hardware · published</p>
        `
      },
      syllabit: {
        eyebrow: 'PM hackathon · 1st place',
        title: 'Syllabit',
        role: 'Personalized learning for ADHD students',
        body: `
          <p>University is built around one kind of attention. Syllabit is for everyone else — an AI-tuned platform that reshapes a syllabus around the way an ADHD mind actually works.</p>
          <p>Paced. Navigable. Actually doable. Took first place at the product management hackathon.</p>

        `
      }
    };

    const caption = document.getElementById('caption');
    document.querySelectorAll('.hot').forEach(function (btn) {
      const key = btn.dataset.key;
      btn.addEventListener('mouseenter', function () { caption.textContent = captions[key]; caption.classList.add('visible'); });
      btn.addEventListener('mouseleave', function () { caption.classList.remove('visible'); });
    });

    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('panel');
    const notebookOverlay = document.getElementById('notebook-overlay');
    const notebookDetail = document.getElementById('notebook-detail');

    function renderProject(id) {
      const p = projects[id];
      notebookDetail.innerHTML =
        '<div class="project-detail-eyebrow">' + p.eyebrow + '</div>' +
        '<div class="project-detail-title">' + p.title + '</div>' +
        '<div class="project-detail-role">' + p.role + '</div>' +
        '<div class="project-detail-body">' + p.body + '</div>';
    }

    function renderPanel(key) {
      const p = panels[key];
      const cls = 'panel-' + p.kind;
      let html = '<button class="close-btn" id="close-btn">×</button>';
      html += '<div class="' + cls + '">';
      if (p.eyebrow) html += '<div class="panel-eyebrow">' + p.eyebrow + '</div>';
      if (p.title) html += '<div class="panel-title">' + p.title + '</div>';
      html += '<div class="panel-body">' + p.body + '</div>';
      html += '</div>';
      panel.innerHTML = html;
      document.getElementById('close-btn').addEventListener('click', closePanel);
    }

    document.querySelectorAll('.hot').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const key = btn.dataset.key;
        if (key === 'shelf') {
          renderProject('emrld');
          notebookOverlay.classList.add('open');
        } else {
          renderPanel(key);
          overlay.classList.add('open');
        }
      });
    });

    document.querySelectorAll('#notebook-toc li').forEach(function (li) {
      li.addEventListener('click', function () {
        document.querySelectorAll('#notebook-toc li').forEach(function (x) { x.classList.remove('active'); });
        li.classList.add('active');
        renderProject(li.dataset.id);
      });
    });

    function closePanel() { overlay.classList.remove('open'); }
    function closeNotebook() { notebookOverlay.classList.remove('open'); }

    overlay.addEventListener('click', function (e) { if (e.target === overlay) closePanel(); });
    notebookOverlay.addEventListener('click', function (e) { if (e.target === notebookOverlay) closeNotebook(); });
    document.getElementById('notebook-close').addEventListener('click', closeNotebook);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closePanel(); closeNotebook(); }
    });
  </script>

</body>
