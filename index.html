<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shriya's Reading Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    /* ============ TOKENS ============ */
    :root {
      --wall-1: #F5DCC8;
      --wall-2: #EFCDB3;
      --floor-1: #D49B7E;
      --floor-2: #B8825F;
      --rug-1: #F8EAD3;
      --rug-2: #EBD9BC;
      --sage: #B0C29A;
      --sage-deep: #889A6F;
      --terracotta: #C56843;
      --terracotta-deep: #A04E2E;
      --warm-cream: #F8E9D0;
      --ink: #4A3220;
      --ink-soft: #7A5A3E;
      --ink-faint: #A88B6A;
      --gold: #B07832;
      --burgundy: #8B3A26;
      --bg-dark: #1F1A10;
    }

    /* ============ RESET / SHELL ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top, #2E2818 0%, #1F1A10 70%);
      color: var(--ink);
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ============ ROOM CONTAINER ============ */
    .room {
      position: relative;
      width: 100%;
      max-width: 1500px;
      height: calc(100vh - 32px);
      border-radius: 4px;
      box-shadow: 0 40px 80px -30px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .room-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ============ TITLE ============ */
    .title-block {
      position: absolute;
      left: 50%;
      top: 4%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 6;
    }
    .title-block .eyebrow {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      letter-spacing: 1.5px;
      margin-bottom: 2px;
    }
    .title-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(28px, 3.2vw, 44px);
      color: var(--ink);
      line-height: 1;
      margin-bottom: 4px;
    }
    .title-block .sub {
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ============ CORNER MENU ============ */
    .menu-toggle {
      position: absolute;
      top: 22px;
      left: 22px;
      background: rgba(248, 233, 208, 0.92);
      border: 1px solid rgba(176, 120, 50, 0.3);
      border-radius: 22px;
      padding: 9px 16px 9px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink);
      cursor: pointer;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .menu-toggle:hover {
      background: var(--warm-cream);
      box-shadow: 0 4px 12px rgba(74, 50, 32, 0.15);
    }
    .menu-icon {
      display: inline-block;
      width: 14px;
      height: 10px;
      position: relative;
    }
    .menu-icon::before,
    .menu-icon::after,
    .menu-icon span {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: var(--ink);
      border-radius: 1px;
    }
    .menu-icon::before { top: 0; }
    .menu-icon span { top: 4.5px; }
    .menu-icon::after { top: 9px; }

    .menu-panel {
      position: absolute;
      top: 70px;
      left: 22px;
      background: var(--warm-cream);
      border: 1px solid rgba(176, 120, 50, 0.3);
      border-radius: 6px;
      padding: 14px 0;
      min-width: 220px;
      box-shadow: 0 12px 32px -8px rgba(74, 50, 32, 0.25);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 8;
    }
    .menu-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .menu-panel-header {
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      padding: 0 22px 8px;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
      margin-bottom: 6px;
    }
    .menu-panel button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 8px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .menu-panel button:hover {
      background: rgba(197, 104, 67, 0.1);
      color: var(--burgundy);
    }
    .menu-panel button .obj-hint {
      display: block;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 11px;
      color: var(--ink-faint);
      margin-top: 1px;
    }

    /* ============ HOT ZONES ============ */
    .hot {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.35s ease;
      z-index: 4;
    }
    .hot:hover, .hot:focus {
      outline: none;
      transform: scale(1.04) translateY(-2px);
      filter: drop-shadow(0 6px 16px rgba(74, 50, 32, 0.25));
    }

    .hot-window     { left: 38%;   top: 14%; width: 24%;   height: 50%; }
    .hot-bigplant   { left: 65%;   top: 27%; width: 11%;   height: 38%; }
    .hot-shelf      { left: 9.3%;  top: 30%; width: 9.5%;  height: 35%; }
    .hot-frame      { left: 11.3%; top: 10%; width: 6.7%;  height: 14%; }
    .hot-armchair   { left: 78%;   top: 48%; width: 14%;   height: 30%; }
    .hot-pillow     { left: 81%;   top: 55%; width: 5%;    height: 6%; }
    .hot-smallplant { left: 1.3%;  top: 60%; width: 8%;    height: 27%; }
    .hot-letter     { left: 28%;   top: 84%; width: 8%;    height: 11%; }
    .hot-cup        { left: 43%;   top: 86%; width: 5%;    height: 9%; }
    .hot-dog        { left: 51%;   top: 78%; width: 14%;   height: 18%; }

    /* ============ GLINTS ============ */
    .glint {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 234, 197, 0.95);
      box-shadow: 0 0 10px 2px rgba(250, 220, 160, 0.7);
      z-index: 5;
      pointer-events: none;
      animation: glint-pulse 2.4s ease-in-out infinite;
    }
    .glint.highlight { animation: glint-highlight 0.8s ease-out; }
    @keyframes glint-pulse {
      0%, 100% { opacity: 0.45; transform: scale(0.85); }
      50%      { opacity: 0.95; transform: scale(1.15); }
    }
    @keyframes glint-highlight {
      0%   { transform: scale(1);   box-shadow: 0 0 10px 2px rgba(250, 220, 160, 0.7); }
      40%  { transform: scale(2.2); box-shadow: 0 0 30px 8px rgba(250, 220, 160, 0.9); opacity: 1; }
      100% { transform: scale(1);   box-shadow: 0 0 10px 2px rgba(250, 220, 160, 0.7); }
    }

    .glint-window     { left: 49.5%; top: 36%; }
    .glint-bigplant   { left: 70%;   top: 35%; }
    .glint-shelf      { left: 13%;   top: 56%; }
    .glint-frame      { left: 14%;   top: 14%; }
    .glint-armchair   { left: 85%;   top: 60%; }
    .glint-pillow     { left: 83%;   top: 58%; }
    .glint-smallplant { left: 5%;    top: 70%; }
    .glint-letter     { left: 31%;   top: 88%; }
    .glint-cup        { left: 45.3%; top: 89%; }
    .glint-dog        { left: 56%;   top: 84%; }

    /* ============ DOG IMAGE ============ */
    .dog-image {
      position: absolute;
      left: 51%;
      top: 78%;
      width: 14%;
      height: auto;
      max-height: 18%;
      object-fit: contain;
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 8px 14px rgba(74, 50, 32, 0.25));
      animation: dog-breathe 4s ease-in-out infinite;
      transform-origin: center bottom;
    }
    @keyframes dog-breathe {
      0%, 100% { transform: scale(1, 1); }
      50%      { transform: scale(1.012, 1.02); }
    }

    /* ============ CAPTION ============ */
    .caption {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink);
      background: rgba(248, 233, 208, 0.92);
      border: 1px solid rgba(176, 120, 50, 0.25);
      padding: 7px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      letter-spacing: 0.5px;
      z-index: 7;
      white-space: nowrap;
    }
    .caption.visible { opacity: 1; }

    .hint {
      position: absolute;
      right: 22px;
      bottom: 12px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.5px;
      opacity: 0.7;
      z-index: 5;
    }

    /* ============ AMBIENT MOTION ============ */
    .curtain-left {
      transform-origin: top left;
      animation: sway-left 6s ease-in-out infinite;
    }
    .curtain-right {
      transform-origin: top right;
      animation: sway-right 6s ease-in-out infinite;
      animation-delay: -3s;
    }
    @keyframes sway-left {
      0%, 100% { transform: translateX(0) skewX(0); }
      50%      { transform: translateX(6px) skewX(1.2deg); }
    }
    @keyframes sway-right {
      0%, 100% { transform: translateX(0) skewX(0); }
      50%      { transform: translateX(-6px) skewX(-1.2deg); }
    }

    .cloud-drift {
      animation: cloud-drift 40s linear infinite;
    }
    @keyframes cloud-drift {
      0%   { transform: translateX(-40px); }
      100% { transform: translateX(40px); }
    }

    .tree-rustle {
      transform-origin: bottom center;
      animation: tree-rustle 5s ease-in-out infinite;
    }
    .tree-rustle.delay-1 { animation-delay: -1.5s; }
    .tree-rustle.delay-2 { animation-delay: -3s; }
    .tree-rustle.delay-3 { animation-delay: -4s; }
    @keyframes tree-rustle {
      0%, 100% { transform: rotate(0); }
      50%      { transform: rotate(0.8deg); }
    }

    .particle {
      animation: particle-drift 12s linear infinite;
      opacity: 0;
    }
    .particle-1 { animation-delay: 0s; }
    .particle-2 { animation-delay: -4s; }
    .particle-3 { animation-delay: -8s; }
    @keyframes particle-drift {
      0%   { transform: translate(0, 0); opacity: 0; }
      10%  { opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translate(180px, 220px); opacity: 0; }
    }

    .steam-1, .steam-2, .steam-3 {
      animation: steam 3s ease-in-out infinite;
    }
    .steam-2 { animation-delay: 0.6s; }
    .steam-3 { animation-delay: 1.2s; }
    @keyframes steam {
      0%, 100% { opacity: 0.2; transform: translateY(0); }
      50%      { opacity: 0.7; transform: translateY(-3px); }
    }

    /* ============ PANEL OVERLAY ============ */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(74, 50, 32, 0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      z-index: 10;
      animation: fade-in 0.3s ease;
    }
    .overlay.open { display: flex; }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .panel {
      max-width: 540px;
      width: 100%;
      max-height: 85%;
      overflow-y: auto;
      animation: panel-in 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }
    @keyframes panel-in {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      background: rgba(248, 233, 208, 0.95);
      border: 1px solid rgba(122, 90, 62, 0.3);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .close-btn:hover { background: var(--warm-cream); color: var(--burgundy); }

    /* Panel variants */
    .panel-card,
    .panel-letter,
    .panel-frame,
    .panel-journal,
    .panel-cushion {
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.4);
    }
    .panel-card {
      background: var(--warm-cream);
      border-radius: 6px;
      padding: 44px 52px;
      border: 1px solid rgba(176, 120, 50, 0.25);
    }
    .panel-letter {
      background: var(--warm-cream);
      padding: 52px 60px;
      transform: rotate(-1.2deg);
      position: relative;
    }
    .panel-letter::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 32%;
      width: 80px;
      height: 22px;
      background: var(--terracotta);
      opacity: 0.7;
      transform: rotate(-3deg);
    }
    .panel-frame {
      background: var(--warm-cream);
      padding: 22px 22px 50px;
      transform: rotate(-1.5deg);
    }
    .panel-journal {
      background: var(--warm-cream);
      padding: 44px 52px;
      background-image: repeating-linear-gradient(
        180deg,
        transparent 0,
        transparent 31px,
        rgba(176, 120, 50, 0.18) 31px,
        rgba(176, 120, 50, 0.18) 32px
      );
      border-left: 3px solid var(--terracotta);
    }
    .panel-cushion {
      background: var(--sage);
      padding: 40px 48px;
      border-radius: 12px;
      color: var(--warm-cream);
    }
    .panel-cushion .panel-eyebrow,
    .panel-cushion .panel-title,
    .panel-cushion .panel-body,
    .panel-cushion .values-list { color: var(--warm-cream); }
    .panel-cushion .values-list li::before { color: var(--warm-cream); }

    .panel-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
      color: var(--ink);
      margin-bottom: 18px;
      line-height: 1.05;
    }
    .panel-body {
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      line-height: 1.75;
      color: var(--ink);
    }
    .panel-body p { margin-bottom: 14px; }
    .panel-body p:last-child { margin-bottom: 0; }
    .panel-body em { color: var(--burgundy); font-style: italic; }

    .signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 30px;
      color: var(--burgundy);
      margin-top: 12px;
    }

    /* Lists used inside panels */
    .contact-list { margin-top: 18px; font-family: 'EB Garamond', serif; font-size: 15px; }
    .contact-list div {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 14px;
      margin-bottom: 6px;
      align-items: baseline;
    }
    .contact-list .lbl { font-style: italic; color: var(--ink-soft); text-align: right; }
    .contact-list a {
      color: var(--burgundy);
      text-decoration: none;
      border-bottom: 1px dotted var(--burgundy);
    }

    .values-list {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
      font-family: 'EB Garamond', serif;
      font-size: 15.5px;
      line-height: 1.85;
    }
    .values-list li {
      padding-left: 22px;
      position: relative;
      margin-bottom: 6px;
    }
    .values-list li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 12px;
    }

    .career-step {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
      align-items: baseline;
    }
    .career-step:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .career-step .when {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      font-size: 13px;
      text-align: right;
    }
    .career-step .what {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .career-step .desc {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .writing-item { padding: 12px 0; border-bottom: 1px dotted rgba(176, 120, 50, 0.35); }
    .writing-item:last-child { border-bottom: none; }
    .writing-item .date {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .writing-item .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .writing-item .ex {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.55;
    }

    .polaroid-photo {
      width: 280px;
      height: 280px;
      background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .polaroid-cap {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      color: var(--ink-soft);
      font-size: 16px;
    }

    /* ============ NOTEBOOK SPREAD ============ */
    .notebook-overlay {
      position: absolute;
      inset: 0;
      background: rgba(74, 50, 32, 0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 30px;
      z-index: 10;
    }
    .notebook-overlay.open { display: flex; animation: fade-in 0.3s ease; }

    .notebook-spread {
      max-width: 1100px;
      width: 100%;
      max-height: 90%;
      background: var(--warm-cream);
      box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.6);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
      animation: notebook-open 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    @keyframes notebook-open {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .notebook-spread::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(176, 120, 50, 0.45), transparent);
      transform: translateX(-1px);
    }
    .notebook-page { padding: 48px 52px 56px; position: relative; min-height: 540px; }
    .notebook-page-left {
      background: linear-gradient(90deg, rgba(212, 155, 126, 0.18) 0%, transparent 30%);
    }
    .notebook-toc { list-style: none; padding: 0; margin: 22px 0 0; }
    .notebook-toc li {
      display: flex;
      align-items: baseline;
      padding: 11px 0;
      border-bottom: 1px dotted rgba(176, 120, 50, 0.35);
      cursor: pointer;
      transition: color 0.25s ease;
    }
    .notebook-toc li:hover .toc-name { color: var(--burgundy); }
    .notebook-toc li.active .toc-name { color: var(--burgundy); font-weight: 500; }
    .toc-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold);
      width: 32px;
      font-size: 17px;
    }
    .toc-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 21px;
      color: var(--ink);
      flex: 1;
      transition: color 0.25s ease;
    }
    .toc-meta {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .project-detail-eyebrow {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .project-detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 34px;
      color: var(--ink);
      margin-bottom: 5px;
      line-height: 1.05;
    }
    .project-detail-role {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 20px;
    }
    .project-detail-body {
      font-family: 'EB Garamond', serif;
      font-size: 15.5px;
      line-height: 1.75;
      color: var(--ink);
    }
    .project-detail-body p { margin-bottom: 13px; }

    .notebook-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: var(--terracotta);
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--warm-cream);
      font-size: 17px;
      z-index: 20;
      transition: background 0.2s ease;
    }
    .notebook-close:hover { background: var(--terracotta-deep); }

    /* ============ MOBILE ============ */
    @media (max-width: 900px) {
      body { padding: 8px; }
      .room { max-height: none; height: calc(100vh - 16px); }
      .title-block h1 { font-size: 22px; }
      .title-block .sub { font-size: 9px; letter-spacing: 2.5px; }
      .menu-toggle { top: 14px; left: 14px; padding: 7px 14px; font-size: 14px; }
      .menu-panel { top: 56px; left: 14px; min-width: 200px; }
      .panel { max-width: 92%; }
      .panel-card,
      .panel-letter,
      .panel-frame,
      .panel-journal,
      .panel-cushion { padding: 30px 26px; }
      .panel-title { font-size: 24px; }
      .notebook-spread { grid-template-columns: 1fr; max-height: 92%; }
      .notebook-spread::before { display: none; }
      .notebook-page { padding: 28px 22px; min-height: auto; }
      .career-step,
      .contact-list div { grid-template-columns: 1fr; gap: 4px; }
      .career-step .when,
      .contact-list .lbl { text-align: left; }
    }
  </style>
</head>

  <script>
    // ============ DATA ============
    const captions = {

      dog:        'bagel · my dog',
      books:      'the books · writing'

    const panels = {
      window: {
        kind: 'card',
        eyebrow: 'looking out',
        title: 'A winding career',
        body: `
          <div class="career-step"><div class="when">2018–2022</div><div><div class="what">Electrical engineering</div><div class="desc">A bachelor's degree, spent studying electrons and occasionally surprising them.</div></div></div>

          <div class="career-step"><div class="when">2025–now</div><div><div class="what">Teaching, alongside</div><div class="desc">Preceptor for seminars on innovation and culture, while looking for the next role.</div></div></div>
        `
      },
      bigplant: {
        kind: 'card',
        eyebrow: 'still growing',
        title: 'About me',
        body: `
          <p>Trained as an electrical engineer; turned product because the most interesting problems turned out to be people problems.</p>

        `
      },
      frame: {
        kind: 'frame',
        body: `
          <div class="polaroid-photo">— a portrait —</div>

        `
      },
      armchair: {
        kind: 'card',
        eyebrow: 'where I sit',
        title: 'Values',
        body: `

          <ul class="values-list">

      pillow: {

        body: `

        `
      },
      smallplant: {
        kind: 'journal',
        eyebrow: 'works in progress',
        title: 'In the soil',
        body: `
          <p style="font-style: italic;">Small things I'm growing — slowly.</p>

            <li>A long essay on tradeoffs in product work, half-drafted.</li>
            <li>A retrieval-tools side project, in nights and weekends.</li>

            <li>A small archive of teaching notes.</li>
            <li>Looking for a product or product-marketing role where engineering instincts are still welcome.</li>
          </ul>

      },
      letter: {
        kind: 'letter',
        eyebrow: 'for you',
        title: 'A letter',
        body: `
          <p>Dear reader,</p>
          <p>If anything in this room resonated — a project worth discussing, a piece of writing worth quarrelling with, a role you think might suit — I would be glad to hear from you.</p>

        kind: 'card',
        eyebrow: 'still warm',
        title: 'Currently reading',
        body: `

        `
      },
      books: {
        kind: 'card',
        eyebrow: 'on the shelf',
        title: 'Writing',
        body: `
          <p style="font-style: italic; color: var(--ink-soft); margin-bottom: 14px;">Short essays on product, tradeoffs, and small decisions.</p>
          <div class="writing-item"><div class="date">Spring 2026</div><div class="name">On build-vs-buy, and other quiet questions</div><div class="ex">"The most interesting product decisions are rarely the ones that make the slide deck…"</div></div>
          <div class="writing-item"><div class="date">Winter 2025</div><div class="name">What the engineer knows about products</div><div class="ex">"The thing you wanted to build and the thing you actually built are almost never the same…"</div></div>
          <div class="writing-item"><div class="date">Autumn 2025</div><div class="name">Notes from the iconoclast seminar</div><div class="ex">"What Berns calls an iconoclast, most teams just call a nuisance…"</div></div>
        `
      },
      dog: {
        kind: 'card',
        eyebrow: 'the small one',
        title: 'Bagel',
        body: `
          <p>This is Bagel. He is, among other things: a sleeping companion, a deadline-ignorer, a witness to most of my drafts, and the only one in this room who is consistently unbothered.</p>
          <p>He is named after the food, not the shape, though both are accurate. He is excellent at long sighs and unauthorized opinions.</p>
          <p style="font-style: italic; color: var(--ink-soft);">If you're reading this, he says hello. (In his own way.)</p>
        `
      }
    };

    const projects = {
      emrld: {
        eyebrow: 'PM & student consultant',
        title: 'EMRLD',
        role: 'A medical education platform · build vs. buy',
        body: `
          <p>The platform was at a fork: build the next set of features in-house, or buy from one of several vendors. Neither answer was obviously right.</p>
          <p>I built a weighted cost-capability framework, ran it across five vendors, and made the case for a hybrid approach — buy the core, build the differentiating layer. The decision cut projected development costs by 66 to 72 percent and kept the platform extensible for whatever came next.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— spring 2025 · medical edtech</p>
        `
      },
      stride: {
        eyebrow: 'founder & PM · top 30 of 625',
        title: 'Stride',
        role: 'Students meet startups',
        body: `
          <p>Students on one side. Recently funded startups on the other. No good way to find each other in the noise.</p>
          <p>I built the bridge — an NLP-driven matching engine for jobs and interview prep, validated through a thousand user interviews. We were selected top 30 of 625 teams nationally.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2024 · careers · NLP</p>
        `
      },
      pawsible: {
        eyebrow: 'innovation hackathon · 2nd place',
        title: 'Pawsible',
        role: 'AI-driven adoption for stray animals',
        body: `
          <p>A stray, picked up off the street. A shelter, a vet visit, a unique ID. Then an AI agent quietly matching the animal with the right home — for keeps.</p>
          <p>I defined end-to-end user journeys across three personas — adopter, shelter, volunteer — and the intelligent matching flows that connected them. Took second at the innovation hackathon.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2024 · social impact · AI</p>
        `
      },
      lift: {
        eyebrow: 'IEEE published',
        title: 'Multi-motor lift system',
        role: 'Synchronous coordination across four motors',
        body: `
          <p>Four motors. One coordinated lift. The architecture had to keep them in perfect sync — no drift, no lag, no over-correction.</p>
          <p>Validated across thirty-plus test cycles, the system held tolerance and shaved 12 percent off the build cost through a leaner architecture. Published with IEEE.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2023 · hardware · published</p>
        `
      },
      syllabit: {
        eyebrow: 'PM hackathon · 1st place',
        title: 'Syllabit',
        role: 'Personalized learning for ADHD students',
        body: `
          <p>University is built around one kind of attention. Syllabit is for everyone else — an AI-tuned platform that reshapes a syllabus around the way an ADHD mind actually works.</p>
          <p>Paced. Navigable. Actually doable. Took first place at the product management hackathon.</p>
          <p style="font-style: italic; color: var(--ink-soft); font-size: 14px;">— 2024 · edtech · accessibility</p>
        `
      }
    };

    // ============ DOM REFS ============
    const caption          = document.getElementById('caption');
    const overlay          = document.getElementById('overlay');
    const panel            = document.getElementById('panel');
    const notebookOverlay  = document.getElementById('notebook-overlay');
    const notebookDetail   = document.getElementById('notebook-detail');
    const menuToggle       = document.getElementById('menu-toggle');
    const menuPanel        = document.getElementById('menu-panel');

    // ============ HELPERS ============
    function highlightGlint(key) {
      const g = document.querySelector('.glint[data-glint="' + key + '"]');
      if (!g) return;
      g.classList.remove('highlight');
      void g.offsetWidth;
      g.classList.add('highlight');
    }

    function renderProject(id) {
      const p = projects[id];
      notebookDetail.innerHTML =
        '<div class="project-detail-eyebrow">' + p.eyebrow + '</div>' +
        '<div class="project-detail-title">'   + p.title   + '</div>' +
        '<div class="project-detail-role">'    + p.role    + '</div>' +
        '<div class="project-detail-body">'    + p.body    + '</div>';
    }

    function renderPanel(key) {
      const p = panels[key];
      const cls = 'panel-' + p.kind;
      let html = '<button class="close-btn" id="close-btn">×</button>';
      html += '<div class="' + cls + '">';
      if (p.eyebrow) html += '<div class="panel-eyebrow">' + p.eyebrow + '</div>';
      if (p.title)   html += '<div class="panel-title">'   + p.title   + '</div>';
      html += '<div class="panel-body">' + p.body + '</div>';
      html += '</div>';
      panel.innerHTML = html;
      document.getElementById('close-btn').addEventListener('click', closePanel);
    }

    function openSection(key) {
      if (key === 'shelf') {
        renderProject('emrld');
        notebookOverlay.classList.add('open');
      } else {
        renderPanel(key);
        overlay.classList.add('open');
      }
      menuPanel.classList.remove('open');
    }

    function closePanel()    { overlay.classList.remove('open'); }
    function closeNotebook() { notebookOverlay.classList.remove('open'); }

    // ============ EVENT WIRING ============

    // Hot zones — hover caption + click open
    document.querySelectorAll('.hot').forEach(function (btn) {
      const key = btn.dataset.key;
      btn.addEventListener('mouseenter', function () {
        caption.textContent = captions[key];
        caption.classList.add('visible');
      });
      btn.addEventListener('mouseleave', function () {
        caption.classList.remove('visible');
      });
      btn.addEventListener('click', function () {
        openSection(key);
      });
    });

    // Menu items — hover highlights room glint, click opens
    document.querySelectorAll('.menu-panel button').forEach(function (btn) {
      const key = btn.dataset.key;
      btn.addEventListener('mouseenter', function () {
        if (key === 'books') return;
        highlightGlint(key);
      });
      btn.addEventListener('click', function () {
        if (key === 'books') {
          renderPanel('books');
          overlay.classList.add('open');
          menuPanel.classList.remove('open');
        } else {
          openSection(key);
        }
      });
    });

    // Menu toggle
    menuToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      menuPanel.classList.toggle('open');
    });
    document.addEventListener('click', function (e) {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove('open');
      }
    });

    // Notebook TOC
    document.querySelectorAll('#notebook-toc li').forEach(function (li) {
      li.addEventListener('click', function () {
        document.querySelectorAll('#notebook-toc li').forEach(function (x) {
          x.classList.remove('active');
        });
        li.classList.add('active');
        renderProject(li.dataset.id);
      });
    });

    // Close interactions
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closePanel();
    });
    notebookOverlay.addEventListener('click', function (e) {
      if (e.target === notebookOverlay) closeNotebook();
    });
    document.getElementById('notebook-close').addEventListener('click', closeNotebook);

    // Escape key
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closePanel();
        closeNotebook();
        menuPanel.classList.remove('open');
      }
    });
  </script>
